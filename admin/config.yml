backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Ürünler"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Ürün Adı", name: "title", widget: "string" }
      - { label: "Açıklama", name: "description", widget: "text" }
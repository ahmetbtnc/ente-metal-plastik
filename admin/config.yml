backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Ürünler"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Ürün Adı", name: "title", widget: "string" }
      - { label: "Açıklama", name: "description", widget: "text" }
      - { label: "Malzeme", name: "material", widget: "string" }
      - { label: "Ölçüler", name: "size", widget: "string" }
      - { label: "Fotoğraflar", name: "images", widget: "image" }

  - name: "settings"
    label: "Site Ayarları"
    files:
      - file: "content/settings/site.json"
        label: "Genel Ayarlar"
        name: "site"
        fields:
          - { label: "Site Adı", name: "title", widget: "string" }
          - { label: "Telefon", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "WhatsApp", name: "whatsapp", widget: "string" }
          - { label: "Adres", name: "address", widget: "text" }